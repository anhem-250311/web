<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/esm/index.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
            min-height: 500px;
        }
        .dashboard header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .logout-btn, .delete-account-btn {
            width: auto;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn {
            background: white;
            color: #667eea;
        }
        .logout-btn:hover {
            background: #f0f0f0;
        }
        .delete-account-btn {
            background: #dc3545;
            color: white;
        }
        .delete-account-btn:hover {
            background: #c82333;
        }
        .dashboard main {
            padding: 30px;
        }
        .user-info {
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .user-info h2 {
            margin-bottom: 15px;
            color: #333;
        }
        #userDetails {
            color: #666;
            line-height: 1.6;
        }
        .data-section {
            margin-top: 30px;
        }
        .data-section h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #savedData {
            margin-top: 20px;
        }
        .data-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-item-content {
            flex: 1;
        }
        .data-item-content p {
            margin: 5px 0;
            color: #333;
        }
        .data-item-content small {
            color: #999;
            font-size: 12px;
        }
        .delete-data-btn {
            padding: 5px 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .empty-message {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h3 {
            color: #dc3545;
            margin-bottom: 15px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        .notification.info { background: #17a2b8; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Xin chào, <span id="userDisplay"></span>!</h1>
            <div class="header-buttons">
                <button id="deleteAccountBtn" class="delete-account-btn">Xoá tài khoản</button>
                <button id="logoutBtn" class="logout-btn">Đăng xuất</button>
            </div>
        </header>
        <main>
            <div class="user-info">
                <h2>Thông tin người dùng</h2>
                <div id="userDetails"></div>
            </div>
            <div class="data-section">
                <h2>Dữ liệu của bạn</h2>
                <form id="dataForm">
                    <div class="form-group">
                        <label for="userData">Nhập dữ liệu:</label>
                        <input type="text" id="userData" placeholder="Nhập thông tin...">
                    </div>
                    <button type="submit" id="saveDataBtn">Lưu dữ liệu</button>
                </form>
                <div id="savedData"></div>
            </div>
        </main>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Xác nhận xoá tài khoản</h3>
            <p>Hành động này KHÔNG THỂ hoàn tác!</p>
            <div class="form-group">
                <label>Nhập mật khẩu:</label>
                <input type="password" id="confirmPassword">
                <small id="passwordError" style="color: red; display: none;">Mật khẩu không đúng!</small>
            </div>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="delete-btn">Xác nhận</button>
                <button id="cancelDeleteBtn" class="cancel-btn">Huỷ</button>
            </div>
        </div>
    </div>
    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        // Cấu hình Appwrite
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69c001f10006c293ac70');

        const databases = new Appwrite.Databases(client);

        const DATABASE_ID = '69c008550002e082a6fc';
        const USERS_COLLECTION_ID = 'users';
        const DATA_COLLECTION_ID = 'user_data';

        function showNotification(msg, type) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.className = `notification ${type}`;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }

        function setLoading(btn, isLoading, text) {
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? '<span class="loading"></span> Đang xử lý...' : text;
        }

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'index.html';

        document.getElementById('userDisplay').textContent = currentUser.username;
        document.getElementById('userDetails').innerHTML = `
            <p><strong>Tên đăng nhập:</strong> ${currentUser.username}</p>
            <p><strong>Ngày tham gia:</strong> ${new Date().toLocaleDateString('vi-VN')}</p>
        `;

        async function loadUserData() {
            try {
                const res = await databases.listDocuments(DATABASE_ID, DATA_COLLECTION_ID, 
                    [Appwrite.Query.equal('userId', currentUser.id)]);
                const saved = document.getElementById('savedData');
                if (res.documents.length === 0) {
                    saved.innerHTML = '<p class="empty-message">Chưa có dữ liệu nào được lưu.</p>';
                    return;
                }
                let html = '<h3>Dữ liệu đã lưu:</h3>';
                res.documents.forEach(item => {
                    html += `<div class="data-item">
                        <div class="data-item-content">
                            <p>${item.content}</p>
                            <small>${new Date(item.timestamp).toLocaleString('vi-VN')}</small>
                        </div>
                        <button class="delete-data-btn" onclick="deleteData('${item.$id}')">Xoá</button>
                    </div>`;
                });
                saved.innerHTML = html;
            } catch (err) {
                showNotification('Lỗi tải dữ liệu: ' + err.message, 'error');
            }
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = document.getElementById('userData').value.trim();
            if (!data) return showNotification('Vui lòng nhập dữ liệu!', 'error');
            const btn = document.getElementById('saveDataBtn');
            setLoading(btn, true, 'Lưu dữ liệu');
            try {
                await databases.createDocument(DATABASE_ID, DATA_COLLECTION_ID, 'unique()', {
                    userId: currentUser.id,
                    content: data,
                    timestamp: new Date().toISOString()
                });
                document.getElementById('userData').value = '';
                await loadUserData();
                showNotification('Đã lưu dữ liệu thành công!', 'success');
            } catch (err) {
                showNotification('Lỗi: ' + err.message, 'error');
            } finally {
                setLoading(btn, false, 'Lưu dữ liệu');
            }
        });

        window.deleteData = async (id) => {
            if (confirm('Bạn có chắc muốn xoá dữ liệu này?')) {
                try {
                    await databases.deleteDocument(DATABASE_ID, DATA_COLLECTION_ID, id);
                    await loadUserData();
                    showNotification('Đã xoá dữ liệu!', 'success');
                } catch (err) {
                    showNotification('Lỗi: ' + err.message, 'error');
                }
            }
        };

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('currentUser');
            showNotification('Đã đăng xuất!', 'info');
            setTimeout(() => window.location.href = 'index.html', 1000);
        };

        // Xoá tài khoản
        const modal = document.getElementById('deleteModal');
        document.getElementById('deleteAccountBtn').onclick = () => modal.classList.add('show');
        document.getElementById('cancelDeleteBtn').onclick = () => modal.classList.remove('show');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

        document.getElementById('confirmDeleteBtn').onclick = async () => {
            const pwd = document.getElementById('confirmPassword').value;
            const err = document.getElementById('passwordError');
            if (!pwd) {
                err.textContent = 'Vui lòng nhập mật khẩu!';
                err.style.display = 'block';
                return;
            }
            try {
                const check = await databases.listDocuments(DATABASE_ID, USERS_COLLECTION_ID, [
                    Appwrite.Query.equal('username', currentUser.username),
                    Appwrite.Query.equal('password', pwd)
                ]);
                if (check.documents.length === 0) {
                    err.textContent = 'Mật khẩu không chính xác!';
                    err.style.display = 'block';
                    return;
                }
                const userData = await databases.listDocuments(DATABASE_ID, DATA_COLLECTION_ID,
                    [Appwrite.Query.equal('userId', currentUser.id)]);
                for (const doc of userData.documents) {
                    await databases.deleteDocument(DATABASE_ID, DATA_COLLECTION_ID, doc.$id);
                }
                await databases.deleteDocument(DATABASE_ID, USERS_COLLECTION_ID, currentUser.id);
                localStorage.removeItem('currentUser');
                modal.classList.remove('show');
                showNotification('Tài khoản đã được xoá thành công!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (err) {
                showNotification('Lỗi: ' + err.message, 'error');
            }
        };

        loadUserData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập đơn giản</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .form-container {
            transition: all 0.3s ease;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #764ba2;
        }
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .toggle-form a:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container" id="loginForm">
            <h2>Đăng nhập</h2>
            <form id="login">
                <div class="form-group">
                    <label for="loginUsername">Tên đăng nhập:</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mật khẩu:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Đăng nhập</button>
                <p class="toggle-form">Chưa có tài khoản? <a href="#" id="showRegister">Đăng ký</a></p>
            </form>
        </div>

        <div class="form-container" id="registerForm" style="display: none;">
            <h2>Đăng ký</h2>
            <form id="register">
                <div class="form-group">
                    <label for="regUsername">Tên đăng nhập:</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Mật khẩu:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Xác nhận mật khẩu:</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <button type="submit">Đăng ký</button>
                <p class="toggle-form">Đã có tài khoản? <a href="#" id="showLogin">Đăng nhập</a></p>
            </form>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([]));
        }

        document.addEventListener('DOMContentLoaded', function() {
            const showRegister = document.getElementById('showRegister');
            const showLogin = document.getElementById('showLogin');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (showRegister) {
                showRegister.addEventListener('click', (e) => {
                    e.preventDefault();
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                    document.getElementById('message').style.display = 'none';
                });
            }

            if (showLogin) {
                showLogin.addEventListener('click', (e) => {
                    e.preventDefault();
                    registerForm.style.display = 'none';
                    loginForm.style.display = 'block';
                    document.getElementById('message').style.display = 'none';
                });
            }

            // Xử lý đăng ký
            const register = document.getElementById('register');
            if (register) {
                register.addEventListener('submit', (e) => {
                    e.preventDefault();

                    const username = document.getElementById('regUsername').value.trim();
                    const password = document.getElementById('regPassword').value;
                    const confirmPassword = document.getElementById('regConfirmPassword').value;

                    if (!username || !password) {
                        showMessage('Vui lòng điền đầy đủ thông tin!', 'error');
                        return;
                    }

                    if (password !== confirmPassword) {
                        showMessage('Mật khẩu xác nhận không khớp!', 'error');
                        return;
                    }

                    if (password.length < 4) {
                        showMessage('Mật khẩu phải có ít nhất 4 ký tự!', 'error');
                        return;
                    }

                    let users = JSON.parse(localStorage.getItem('users'));

                    if (users.some(user => user.username === username)) {
                        showMessage('Tên đăng nhập đã tồn tại!', 'error');
                        return;
                    }

                    users.push({
                        username: username,
                        password: password,
                        data: []
                    });

                    localStorage.setItem('users', JSON.stringify(users));

                    showMessage('Đăng ký thành công!', 'success');

                    registerForm.style.display = 'none';
                    loginForm.style.display = 'block';
                    register.reset();
                });
            }

            // Xử lý đăng nhập
            const login = document.getElementById('login');
            if (login) {
                login.addEventListener('submit', (e) => {
                    e.preventDefault();

                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value;

                    let users = JSON.parse(localStorage.getItem('users'));
                    const user = users.find(u => u.username === username && u.password === password);

                    if (user) {
                        localStorage.setItem('currentUser', JSON.stringify({
                            username: user.username
                        }));

                        showMessage('Đăng nhập thành công!', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        showMessage('Tên đăng nhập hoặc mật khẩu không đúng!', 'error');
                    }
                });
            }
        });
    </script>
</body>
</html>

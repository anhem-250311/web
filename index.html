<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0/dist/esm/index.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .form-container {
            transition: all 0.3s ease;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .toggle-form a:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container" id="loginForm">
            <h2>Đăng nhập</h2>
            <form id="login">
                <div class="form-group">
                    <label for="loginUsername">Tên đăng nhập:</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Mật khẩu:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" id="loginBtn">Đăng nhập</button>
                <p class="toggle-form">Chưa có tài khoản? <a href="#" id="showRegister">Đăng ký</a></p>
            </form>
        </div>

        <div class="form-container" id="registerForm" style="display: none;">
            <h2>Đăng ký</h2>
            <form id="register">
                <div class="form-group">
                    <label for="regUsername">Tên đăng nhập:</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Mật khẩu:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Xác nhận mật khẩu:</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <button type="submit" id="registerBtn">Đăng ký</button>
                <p class="toggle-form">Đã có tài khoản? <a href="#" id="showLogin">Đăng nhập</a></p>
            </form>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        // ============== CẤU HÌNH APPWRITE ==============
        const APPWRITE_CONFIG = {
            endpoint: 'https://cloud.appwrite.io/v1',
            projectId: '69c001f10006c293ac70',
            databaseId: '69c008550002e082a6fc',
            usersCollectionId: 'users'
        };

        const client = new Appwrite.Client();
        client
            .setEndpoint(APPWRITE_CONFIG.endpoint)
            .setProject(APPWRITE_CONFIG.projectId);

        const databases = new Appwrite.Databases(client);

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function setLoading(button, isLoading) {
            if (isLoading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span> Đang xử lý...';
            } else {
                button.disabled = false;
                button.innerHTML = button.id === 'loginBtn' ? 'Đăng nhập' : 'Đăng ký';
            }
        }

        const showRegisterLink = document.getElementById('showRegister');
        const showLoginLink = document.getElementById('showLogin');
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');

        if (showRegisterLink) {
            showRegisterLink.addEventListener('click', (e) => {
                e.preventDefault();
                loginFormDiv.style.display = 'none';
                registerFormDiv.style.display = 'block';
                document.getElementById('message').style.display = 'none';
            });
        }

        if (showLoginLink) {
            showLoginLink.addEventListener('click', (e) => {
                e.preventDefault();
                registerFormDiv.style.display = 'none';
                loginFormDiv.style.display = 'block';
                document.getElementById('message').style.display = 'none';
            });
        }

        // ĐĂNG KÝ
        const registerForm = document.getElementById('register');
        const registerBtn = document.getElementById('registerBtn');

        if (registerForm) {
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirmPassword = document.getElementById('regConfirmPassword').value;
                
                if (!username || !password) {
                    showMessage('Vui lòng điền đầy đủ thông tin!', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showMessage('Mật khẩu xác nhận không khớp!', 'error');
                    return;
                }
                
                if (password.length < 4) {
                    showMessage('Mật khẩu phải có ít nhất 4 ký tự!', 'error');
                    return;
                }
                
                setLoading(registerBtn, true);
                
                try {
                    const existingUsers = await databases.listDocuments(
                        APPWRITE_CONFIG.databaseId,
                        APPWRITE_CONFIG.usersCollectionId,
                        [Appwrite.Query.equal('username', username)]
                    );
                    
                    if (existingUsers.documents.length > 0) {
                        showMessage('Tên đăng nhập đã tồn tại!', 'error');
                        setLoading(registerBtn, false);
                        return;
                    }
                    
                    await databases.createDocument(
                        APPWRITE_CONFIG.databaseId,
                        APPWRITE_CONFIG.usersCollectionId,
                        'unique()',
                        {
                            username: username,
                            password: password
                        }
                    );
                    
                    showMessage('Đăng ký thành công! Vui lòng đăng nhập.', 'success');
                    
                    registerFormDiv.style.display = 'none';
                    loginFormDiv.style.display = 'block';
                    registerForm.reset();
                    
                } catch (error) {
                    console.error(error);
                    showMessage('Lỗi: ' + error.message, 'error');
                } finally {
                    setLoading(registerBtn, false);
                }
            });
        }

        // ĐĂNG NHẬP
        const loginForm = document.getElementById('login');
        const loginBtn = document.getElementById('loginBtn');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!username || !password) {
                    showMessage('Vui lòng điền đầy đủ thông tin!', 'error');
                    return;
                }
                
                setLoading(loginBtn, true);
                
                try {
                    const response = await databases.listDocuments(
                        APPWRITE_CONFIG.databaseId,
                        APPWRITE_CONFIG.usersCollectionId,
                        [
                            Appwrite.Query.equal('username', username),
                            Appwrite.Query.equal('password', password)
                        ]
                    );
                    
                    if (response.documents.length > 0) {
                        const user = response.documents[0];
                        localStorage.setItem('currentUser', JSON.stringify({
                            id: user.$id,
                            username: user.username
                        }));
                        
                        showMessage('Đăng nhập thành công!', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else {
                        showMessage('Tên đăng nhập hoặc mật khẩu không đúng!', 'error');
                    }
                    
                } catch (error) {
                    console.error(error);
                    showMessage('Lỗi kết nối: ' + error.message, 'error');
                } finally {
                    setLoading(loginBtn, false);
                }
            });
        }
    </script>
</body>
</html>
